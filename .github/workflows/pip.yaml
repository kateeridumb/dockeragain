name: cosmetics

on:
  push:
    branches: [master, main]

env:
  PROJECT_PATH: CosmeticShopAPI.csproj

jobs:
  build-check:
    name: build-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: SDK version and environment
        run: |
          echo "=== Версия .NET SDK ==="
          dotnet --version
          echo "=== Проверка окружения ==="

      - name: Проверка сборки проекта
        run: |
          echo "=== Проверка сборки проекта ==="
          dotnet restore "$PROJECT_PATH"
          dotnet build "$PROJECT_PATH" -c Release --no-restore

  lint-check:
    name: lint-check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: SDK version and environment
        run: |
          echo "=== Версия .NET SDK ==="
          dotnet --version
          echo "=== Проверка окружения ==="

      - name: Проверка форматирования кода
        run: |
          echo "=== Проверка форматирования кода ==="
          dotnet restore "$PROJECT_PATH"
          dotnet format "$PROJECT_PATH" --verify-no-changes --verbosity minimal

  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: SDK version and environment
        run: |
          echo "=== Версия .NET SDK ==="
          dotnet --version
          echo "=== Проверка окружения ==="

      - name: Проверка уязвимостей NuGet пакетов
        run: |
          echo "=== Проверка уязвимостей NuGet пакетов ==="
          dotnet list "$PROJECT_PATH" package --vulnerable --include-transitive || echo "Уязвимости не найдены"

  test-backend:
    name: test-backend
    runs-on: ubuntu-latest
    needs: [build-check]
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Запуск тестов
        run: |
          echo "=== Запуск тестов ==="
          dotnet restore "$PROJECT_PATH"
          dotnet test "$PROJECT_PATH" -c Release --verbosity normal

  run-backend:
    name: run-backend
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: SDK version and environment
        run: |
          echo "=== Версия .NET SDK ==="
          dotnet --version
          echo "=== Проверка окружения ==="

      - name: Проверка запуска backend
        run: |
          echo "=== Проверка запуска backend ==="
          dotnet restore "$PROJECT_PATH"
          dotnet build "$PROJECT_PATH" -c Release --no-restore
          echo "=== Запуск приложения ==="
          dotnet run --project "$PROJECT_PATH" --urls="http://0.0.0.0:5000" &
          sleep 5
          echo "=== Приложение запущено, проверка доступности ==="
          curl -I http://localhost:5000 || echo "Приложение запущено, но эндпоинт не отвечает"
          echo "=== Остановка приложения ==="
          kill %1 || true